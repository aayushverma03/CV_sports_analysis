test_id: juggling
display_name: "Juggling Test"

aggregation:
  method: weighted_mean
  weights:
    max_consecutive_touches: 0.6
    touches_per_second:      0.4

metrics:
  max_consecutive_touches:
    direction: higher_is_better
    unit: count
    # Coaching benchmarks: 100 juggles is the common "academy entry" threshold
    # for U17+ players; 50 is expected for trained players; 200+ for elite
    # technical specialists.
    male:    { P: 20, E: 50, A: 100, L: 200 }
    female:  { P: 15, E: 40, A: 80,  L: 150 }

  touches_per_second:
    direction: higher_is_better
    unit: hz
    # Sustained juggling cadence; ~2 Hz is comfortable for trained players,
    # 2.5+ requires strong rhythm and ball control.
    male:    { P: 1.0, E: 1.5, A: 2.0, L: 2.5 }
    female:  { P: 0.9, E: 1.3, A: 1.8, L: 2.3 }

metadata:
  source: |
    Coaching / academy benchmarks (FlickTec; Elite International Soccer Training;
    Coerver/Individual Skills frameworks). No peer-reviewed normative data
    located for elite-youth max-consecutive-touch percentiles. Treat as
    starting heuristic; refine after first cohort of athlete data.
  confidence: provisional
  last_updated: 2026-04-30
