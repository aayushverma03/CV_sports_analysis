test_id: yo-yo-intermittent
display_name: "Yo-Yo Intermittent Recovery Test (IR2)"

aggregation:
  method: weighted_mean
  weights:
    total_distance_m: 0.6
    final_speed_level: 0.4

metrics:
  total_distance_m:
    direction: higher_is_better
    unit: m
    male:    { P: 240, E: 640, A: 1120, L: 1280 }
    female:  { P: 160, E: 400, A: 680,  L: 800 }

  final_speed_level:
    direction: higher_is_better
    unit: level
    male:    { P: 18.2, E: 20.5, A: 22.1, L: 23.0 }
    female:  { P: 17.2, E: 19.3, A: 20.6, L: 21.5 }

metadata:
  source: "User-provided Yo-Yo IR2 thresholds, elite-football population"
  confidence: high
  last_updated: 2026-04-30
