# Training config for hurdle_v1 detector.
#
# Source dataset: own labelling, ayushverma/hurdle (Roboflow).
# 15 images (10 train / 3 valid / 2 test) after auto-split, single class `hurdle`.
#
# WARNING: this is a very small dataset (10 train images). Expect overfitting
# and noisy mAP. Treat the resulting weights as a v0.5 prototype; plan to
# extend the dataset (extract more frames at higher fps from the Hurdle
# video, label more clips) before relying on this in production.
#
# Run:  uv run scripts/train_yolo.py --config configs/training/hurdle_v1.yaml

detector_name: hurdle_v1
dataset_yaml: data/_labelling/community/hurdle_v1/data.yaml
base_model: yolo26n.pt

epochs: 100
imgsz: 640
batch: 4           # tiny dataset — keep batch < train count
patience: 20
device: auto
seed: 0
