# Training config for plyo_box_v1 detector.
#
# Source dataset: own labelling, ayushverma/plyo_box (Roboflow).
# 43 images (30 train / 8 valid / 5 test) after auto-split, single class `plyo_box`.
#
# Run:  uv run scripts/train_yolo.py --config configs/training/plyo_box_v1.yaml

detector_name: plyo_box_v1
dataset_yaml: data/_labelling/community/plyo_box_v1/data.yaml
base_model: yolo26n.pt

epochs: 100
imgsz: 640
batch: 8           # smaller batch — only 30 train images
patience: 20
device: auto
seed: 0
